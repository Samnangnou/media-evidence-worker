name: Media Evidence Extract

on:
  workflow_dispatch:
    inputs:
      payload_json:
        description: Narrow extraction dispatch payload JSON
        required: true
  repository_dispatch:
    types:
      - transcript_extract

jobs:
  transcript:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1

      - name: Write YouTube cookies
        run: |
          if [ -n "${YOUTUBE_COOKIES_NETSCAPE:-}" ]; then
            cat > /tmp/ytcookies.txt <<'EOF'
${{ secrets.YOUTUBE_COOKIES_NETSCAPE }}
EOF
            chmod 600 /tmp/ytcookies.txt
            echo "YOUTUBE_COOKIES_FILE=/tmp/ytcookies.txt" >> "$GITHUB_ENV"
          fi
        env:
          YOUTUBE_COOKIES_NETSCAPE: ${{ secrets.YOUTUBE_COOKIES_NETSCAPE }}

      - name: Resolve payload
        run: |
          python3 - <<'PY'
          import json
          import os

          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = os.environ["GITHUB_EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          if event_name == "repository_dispatch":
              payload = event.get("client_payload", {}).get("payload_json", "")
          else:
              payload = event.get("inputs", {}).get("payload_json", "")

          if not payload:
              raise SystemExit("Missing payload_json")

          with open("/tmp/payload.json", "w", encoding="utf-8") as out:
              out.write(payload)

          print("payload_ready")
          PY

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run extraction job and callback
        run: python scripts/run_extraction_job.py --payload-json "$(cat /tmp/payload.json)"
